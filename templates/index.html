<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Soziologie">
    <meta name="theme-color" content="#4f46e5">
    <title>Soziologie Lernen</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body {
            -webkit-tap-highlight-color: transparent;
        }
        /* Safe area insets for notched phones */
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen safe-top safe-bottom">
    <div x-data="learningApp()" x-init="loadNextCard()" class="max-w-lg mx-auto">
        <!-- Header with progress -->
        <header class="bg-indigo-600 text-white px-4 py-3 sticky top-0 z-10">
            <div class="flex items-center justify-between">
                <h1 class="font-semibold">Soziologie</h1>
                <div class="flex items-center gap-3 text-sm">
                    <span x-show="progress" x-cloak>
                        <span x-text="progress.today_completed"></span> heute
                    </span>
                    <span x-show="progress" x-cloak class="text-indigo-200">
                        <span x-text="progress.remaining"></span> offen
                    </span>
                </div>
            </div>
        </header>

        <!-- Main content area -->
        <main class="p-4">
            <!-- Loading state -->
            <div x-show="loading" class="flex items-center justify-center py-20">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
            </div>

            <!-- No cards available -->
            <div x-show="!loading && !currentCard" x-cloak class="text-center py-20">
                <div class="text-6xl mb-4">🎉</div>
                <h2 class="text-xl font-semibold text-gray-800 mb-2">Alles erledigt!</h2>
                <p class="text-gray-600 mb-6">Keine weiteren Karten verfügbar.</p>
                <button @click="loadNextCard()"
                        class="px-6 py-2 bg-indigo-600 text-white rounded-lg">
                    Aktualisieren
                </button>
            </div>

            <!-- Card container -->
            <div x-show="!loading && currentCard" x-cloak>
                <!-- Success message after submission -->
                <div x-show="showSuccess" x-cloak
                     class="mb-4 p-4 bg-green-50 border border-green-200 rounded-lg text-center">
                    <p class="text-green-800 font-medium" x-text="successMessage"></p>
                </div>

                <!-- Card wrapper -->
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <!-- Dynamic card content -->
                    <div id="card-content" x-html="currentCard?.card_html"></div>
                </div>

                <!-- Skip button -->
                <div class="mt-4 text-center">
                    <button @click="skipCard()"
                            :disabled="submitting"
                            class="text-gray-500 text-sm hover:text-gray-700 disabled:opacity-50">
                        Überspringen
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Global card response component - available to all card HTML snippets
        function cardResponse() {
            return {
                submitting: false,
                submitted: false,
                error: null,

                async submitResponse(data) {
                    this.submitting = true;
                    this.error = null;

                    try {
                        // Get the card ID from the parent learningApp
                        const app = Alpine.$data(document.querySelector('[x-data*="learningApp"]'));
                        const cardId = app.currentCard?.id;

                        if (!cardId) {
                            throw new Error('Keine Karte geladen');
                        }

                        const response = await fetch('/api/response', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                card_id: cardId,
                                response_content: data
                            })
                        });

                        const result = await response.json();

                        if (!response.ok) {
                            throw new Error(result.error || 'Fehler beim Senden');
                        }

                        this.submitted = true;

                        // Notify parent app of successful submission
                        app.onCardSubmitted(result.message);

                    } catch (e) {
                        this.error = e.message;
                    } finally {
                        this.submitting = false;
                    }
                }
            };
        }

        // Main learning app component
        function learningApp() {
            return {
                currentCard: null,
                progress: null,
                loading: true,
                submitting: false,
                showSuccess: false,
                successMessage: '',

                async loadNextCard() {
                    this.loading = true;
                    this.showSuccess = false;

                    try {
                        const response = await fetch('/api/next-card');
                        const data = await response.json();

                        this.currentCard = data.card;
                        this.progress = data.progress;

                    } catch (e) {
                        console.error('Failed to load card:', e);
                    } finally {
                        this.loading = false;
                    }
                },

                onCardSubmitted(message) {
                    this.successMessage = message || 'Aufgezeichnet';
                    this.showSuccess = true;

                    // Load next card after a brief delay
                    setTimeout(() => {
                        this.loadNextCard();
                    }, 1500);
                },

                async skipCard() {
                    if (!this.currentCard || this.submitting) return;

                    this.submitting = true;

                    try {
                        const response = await fetch('/api/skip', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ card_id: this.currentCard.id })
                        });

                        if (response.ok) {
                            this.loadNextCard();
                        }
                    } catch (e) {
                        console.error('Failed to skip card:', e);
                    } finally {
                        this.submitting = false;
                    }
                }
            };
        }
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
