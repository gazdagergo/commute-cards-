<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Soziologie">
    <meta name="theme-color" content="#4f46e5">
    <title>Soziologie Lernen</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body {
            -webkit-tap-highlight-color: transparent;
        }
        /* Safe area insets for notched phones */
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen safe-top safe-bottom">
    <div x-data="learningApp()" x-init="loadNextCard()" class="max-w-lg mx-auto">
        <!-- Header with progress -->
        <header class="bg-indigo-600 text-white px-4 py-3 sticky top-0 z-10">
            <div class="flex items-center justify-between">
                <h1 class="font-semibold">Soziologie</h1>
                <div class="flex items-center gap-3 text-sm">
                    <span x-show="progress" x-cloak>
                        <span x-text="progress.today_completed"></span> heute
                    </span>
                    <span x-show="progress" x-cloak class="text-indigo-200">
                        <span x-text="progress.remaining"></span> offen
                    </span>
                </div>
            </div>
        </header>

        <!-- Main content area -->
        <main class="p-4">
            <!-- Loading state -->
            <div x-show="loading" class="flex items-center justify-center py-20">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
            </div>

            <!-- No cards available -->
            <div x-show="!loading && !currentCard" x-cloak class="text-center py-20">
                <div class="text-6xl mb-4">🎉</div>
                <h2 class="text-xl font-semibold text-gray-800 mb-2">Alles erledigt!</h2>
                <p class="text-gray-600 mb-6">Keine weiteren Karten verfügbar.</p>
                <button @click="loadNextCard()"
                        class="px-6 py-2 bg-indigo-600 text-white rounded-lg">
                    Aktualisieren
                </button>
            </div>

            <!-- Card container -->
            <div x-show="!loading && currentCard && !showFeedback" x-cloak>
                <!-- Card wrapper -->
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <!-- Dynamic card content -->
                    <div id="card-content" x-html="currentCard?.card_html"></div>
                </div>

                <!-- Skip button -->
                <div class="mt-4 text-center">
                    <button @click="skipCard()"
                            :disabled="submitting"
                            class="text-gray-500 text-sm hover:text-gray-700 disabled:opacity-50">
                        Überspringen
                    </button>
                </div>
            </div>

            <!-- Feedback form after submission -->
            <div x-show="showFeedback" x-cloak class="bg-white rounded-xl shadow-sm p-4">
                <div class="text-center mb-4">
                    <div class="inline-flex items-center justify-center w-12 h-12 bg-green-100 rounded-full mb-3">
                        <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                    </div>
                    <p class="text-green-800 font-medium" x-text="successMessage"></p>
                </div>

                <!-- Scheduling section -->
                <div class="border-t pt-4 mb-4">
                    <p class="text-gray-700 text-sm mb-3 text-center">Wann willst du diese Karte wiederholen?</p>

                    <div class="flex flex-col gap-2">
                        <!-- Repeat today -->
                        <button @click="scheduleType = 'today'"
                                class="w-full py-2 px-3 rounded-lg text-sm text-left border transition-colors"
                                :class="scheduleType === 'today' ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-300 text-gray-700'">
                            Heute nochmal
                        </button>

                        <!-- In X days -->
                        <div class="flex items-center gap-2">
                            <button @click="scheduleType = 'days'"
                                    class="flex-1 py-2 px-3 rounded-lg text-sm text-left border transition-colors"
                                    :class="scheduleType === 'days' ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-300 text-gray-700'">
                                In
                                <input type="number" x-model.number="scheduleDays"
                                       @click.stop @focus="scheduleType = 'days'"
                                       min="1" max="365"
                                       class="w-12 mx-1 px-2 py-0.5 border border-gray-300 rounded text-center text-sm focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500">
                                Tagen
                            </button>
                        </div>

                        <!-- Never repeat -->
                        <button @click="scheduleType = 'never'"
                                class="w-full py-2 px-3 rounded-lg text-sm text-left border transition-colors"
                                :class="scheduleType === 'never' ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-300 text-gray-700'">
                            Nicht wiederholen
                        </button>
                    </div>
                </div>

                <div class="border-t pt-4">
                    <p class="text-gray-700 text-sm mb-3 text-center">Wie hat dir diese Karte gefallen? (optional)</p>

                    <!-- Star rating -->
                    <div class="flex justify-center gap-1 mb-4">
                        <template x-for="star in [1, 2, 3, 4, 5]" :key="star">
                            <button @click="feedbackRating = star"
                                    class="text-3xl transition-transform hover:scale-110 focus:outline-none"
                                    :class="star <= feedbackRating ? 'text-yellow-400' : 'text-gray-300'">
                                ★
                            </button>
                        </template>
                    </div>

                    <!-- Optional comment -->
                    <textarea x-model="feedbackComment"
                              class="w-full p-3 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                              rows="2"
                              placeholder="Ideen, Verbesserungsvorschläge... (optional)"></textarea>

                    <!-- Submit -->
                    <button @click="submitScheduleAndFeedback()"
                            :disabled="!scheduleType || submittingFeedback"
                            class="w-full mt-3 py-3 bg-indigo-600 text-white rounded-lg text-sm font-medium disabled:opacity-50">
                        <span x-show="!submittingFeedback">Weiter</span>
                        <span x-show="submittingFeedback">...</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Global card response component - available to all card HTML snippets
        function cardResponse() {
            return {
                submitting: false,
                submitted: false,
                error: null,

                async submitResponse(data) {
                    this.submitting = true;
                    this.error = null;

                    try {
                        // Get the card ID from the parent learningApp
                        const app = Alpine.$data(document.querySelector('[x-data*="learningApp"]'));
                        const cardId = app.currentCard?.id;

                        if (!cardId) {
                            throw new Error('Keine Karte geladen');
                        }

                        const response = await fetch('/api/response', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                card_id: cardId,
                                response_content: data
                            })
                        });

                        const result = await response.json();

                        if (!response.ok) {
                            throw new Error(result.error || 'Fehler beim Senden');
                        }

                        this.submitted = true;

                        // Notify parent app of successful submission with response_id
                        app.onCardSubmitted(result.message, result.response_id);

                    } catch (e) {
                        this.error = e.message;
                    } finally {
                        this.submitting = false;
                    }
                }
            };
        }

        // Main learning app component
        function learningApp() {
            return {
                currentCard: null,
                progress: null,
                loading: true,
                submitting: false,
                successMessage: '',
                // Feedback state
                showFeedback: false,
                currentResponseId: null,
                feedbackRating: 0,
                feedbackComment: '',
                submittingFeedback: false,
                // Scheduling state
                scheduleType: null, // 'today', 'days', 'never'
                scheduleDays: 3,

                async loadNextCard() {
                    this.loading = true;
                    this.showFeedback = false;
                    this.resetFeedback();

                    try {
                        const response = await fetch('/api/next-card');
                        const data = await response.json();

                        this.currentCard = data.card;
                        this.progress = data.progress;

                    } catch (e) {
                        console.error('Failed to load card:', e);
                    } finally {
                        this.loading = false;
                    }
                },

                resetFeedback() {
                    this.feedbackRating = 0;
                    this.feedbackComment = '';
                    this.currentResponseId = null;
                    this.scheduleType = null;
                    this.scheduleDays = 3;
                },

                onCardSubmitted(message, responseId) {
                    this.successMessage = message || 'Aufgezeichnet';
                    this.currentResponseId = responseId;
                    this.showFeedback = true;
                },

                async submitScheduleAndFeedback() {
                    if (!this.scheduleType || this.submittingFeedback) return;

                    this.submittingFeedback = true;

                    try {
                        // Submit schedule
                        const scheduleData = {
                            card_id: this.currentCard.id,
                            schedule_type: this.scheduleType
                        };
                        if (this.scheduleType === 'days') {
                            scheduleData.days = this.scheduleDays;
                        }

                        await fetch('/api/schedule', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(scheduleData)
                        });

                        // Submit feedback if rating provided
                        if (this.feedbackRating > 0) {
                            await fetch('/api/feedback', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    response_id: this.currentResponseId,
                                    rating: this.feedbackRating,
                                    comment: this.feedbackComment
                                })
                            });
                        }
                    } catch (e) {
                        console.error('Failed to submit:', e);
                    } finally {
                        this.submittingFeedback = false;
                        this.loadNextCard();
                    }
                },

                async skipCard() {
                    if (!this.currentCard || this.submitting) return;

                    this.submitting = true;

                    try {
                        const response = await fetch('/api/skip', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ card_id: this.currentCard.id })
                        });

                        if (response.ok) {
                            this.loadNextCard();
                        }
                    } catch (e) {
                        console.error('Failed to skip card:', e);
                    } finally {
                        this.submitting = false;
                    }
                }
            };
        }
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
